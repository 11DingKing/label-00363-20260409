<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏到导航页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      resize: none;
      height: 60px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #666;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .success {
      text-align: center;
      padding: 20px;
    }
    .success-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .hidden {
      display: none;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .settings-title {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="form-view">
      <h1>🔖 收藏到导航页</h1>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="title" placeholder="网页标题">
      </div>
      <div class="form-group">
        <label>网址</label>
        <input type="url" id="url" placeholder="https://example.com" readonly>
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="description" placeholder="可选描述"></textarea>
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="category">
          <option value="default">📁 默认</option>
          <option value="work">💼 工作</option>
          <option value="study">📚 学习</option>
          <option value="entertainment">🎮 娱乐</option>
          <option value="tools">🔧 工具</option>
        </select>
      </div>
      <button class="btn btn-primary" id="save-btn">收藏</button>
      <button class="btn btn-secondary" id="sync-btn">同步浏览器书签</button>
      
      <div class="settings">
        <div class="settings-title">导航页地址</div>
        <input type="url" id="nav-url" placeholder="http://localhost:5173">
      </div>
    </div>
    
    <div id="success-view" class="hidden">
      <div class="success">
        <div class="success-icon">✅</div>
        <p>收藏成功！</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
