services:
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: browser-nav-frontend
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - browser-nav-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  browser-nav-network:
    driver: bridge
